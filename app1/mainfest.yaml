# Pod Deployment 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  # labels of deployment resource
  labels:
    app: app1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
      - name: app1
        image: rahul8096/app1
        ports:
        - containerPort: 80
---
# Service Load Balancer
kind: Service
apiVersion: v1
metadata:
  name: app1
spec:
  selector: # labels are used as selectors
    app: app1
  ports:
  - protocol: TCP
    port: 80 # service port
    targetPort: 80
---
# Ingress Controller Load Balancer 
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app1
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:631164543894:certificate/eaed1c1e-f8f8-4b3e-aeba-20faf3d84eb3
    alb.ingress.kubernetes.io/group.name: Rahul
spec:
  ingressClassName: alb
  rules:
  - host: "app1.practice25.online"
    http:
      paths: 
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: app1
            port:
              number: 80
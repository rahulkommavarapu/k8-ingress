
#1. Ingress Controller Load Balancer 
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app2
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:631164543894:certificate/eaed1c1e-f8f8-4b3e-aeba-20faf3d84eb3
    alb.ingress.kubernetes.io/group.name: rahul
spec:
  ingressClassName: alb
  rules:
  - host: "app2.practice25.online"
    http:
      paths: 
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: app2
            port: 
              number: 80

---              
 # 2.Service Load Balancer
kind: Service
apiVersion: v1
metadata:
  name: app2
spec:
  selector: # labels are used as selectors
    app: app2
  ports:
  - protocol: TCP
    port: 80 # service port
    targetPort: 80
---
#3. Pod Deployment 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
  # labels of deployment resource
  labels:
    app: app2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app2
  template:
    metadata:
      labels:
        app: app2
    spec:
      containers:
      - name: app2
        image: rahul8096/app2:1.0.0
        ports:
        - containerPort: 80